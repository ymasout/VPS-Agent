name: vps-agent-console

services:
  caddy:
    image: caddy:2-alpine
    command: ["caddy", "run", "--config", "/etc/caddy/cfg/Caddyfile", "--adapter", "caddyfile"]
    restart: unless-stopped
    environment:
      CONTROL_PLANE_DOMAIN: ${CONTROL_PLANE_DOMAIN:?set CONTROL_PLANE_DOMAIN}
      CADDY_ADMIN_USER: ${CADDY_ADMIN_USER:?set CADDY_ADMIN_USER}
      CADDY_ADMIN_PASSWORD_HASH: ${CADDY_ADMIN_PASSWORD_HASH:?set CADDY_ADMIN_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy:/etc/caddy/cfg:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    mem_limit: 256m

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:8000
      NEXT_PUBLIC_API_URL: https://${CONTROL_PLANE_DOMAIN}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?set ADMIN_API_TOKEN}
      AGENT_OPERATION_KEY_ID: ${AGENT_OPERATION_KEY_ID:-}
      AGENT_OPERATION_PUBLIC_KEY_BASE64: ${AGENT_OPERATION_PUBLIC_KEY_BASE64:-}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 1g

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:?set ADMIN_API_TOKEN}
      AGENT_OFFLINE_AFTER_SECONDS: ${AGENT_OFFLINE_AFTER_SECONDS:-90}
      AGENT_AVAILABILITY_SCAN_INTERVAL_SECONDS: ${AGENT_AVAILABILITY_SCAN_INTERVAL_SECONDS:-30}
      OPERATION_SIGNING_KEY_ID: ${OPERATION_SIGNING_KEY_ID:-}
      OPERATION_SIGNING_PRIVATE_KEY_BASE64: ${OPERATION_SIGNING_PRIVATE_KEY_BASE64:-}
      OPERATION_OBSERVATION_MAX_AGE_SECONDS: ${OPERATION_OBSERVATION_MAX_AGE_SECONDS:-120}
      OPERATION_CLAIM_LEASE_SECONDS: ${OPERATION_CLAIM_LEASE_SECONDS:-60}
      OPERATION_EXECUTION_TIMEOUT_SECONDS: ${OPERATION_EXECUTION_TIMEOUT_SECONDS:-30}
      OPERATION_DEPLOY_EXECUTION_TIMEOUT_SECONDS: ${OPERATION_DEPLOY_EXECUTION_TIMEOUT_SECONDS:-300}
      OPERATION_EXECUTION_RESULT_GRACE_SECONDS: ${OPERATION_EXECUTION_RESULT_GRACE_SECONDS:-15}
      OPERATION_VERIFICATION_WINDOW_SECONDS: ${OPERATION_VERIFICATION_WINDOW_SECONDS:-30}
      OPERATION_VERIFICATION_TIMEOUT_SECONDS: ${OPERATION_VERIFICATION_TIMEOUT_SECONDS:-180}
      OPERATION_MAX_OUTPUT_BYTES: ${OPERATION_MAX_OUTPUT_BYTES:-16384}
      OPERATION_MAX_OUTPUT_LINES: ${OPERATION_MAX_OUTPUT_LINES:-100}
      ALERT_PENDING_OBSERVATIONS: ${ALERT_PENDING_OBSERVATIONS:-2}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      CONSOLE_PUBLIC_URL: https://${CONTROL_PLANE_DOMAIN}
      NOTIFICATION_TIMEOUT_SECONDS: ${NOTIFICATION_TIMEOUT_SECONDS:-5}
      NOTIFICATION_SENDING_STALE_SECONDS: ${NOTIFICATION_SENDING_STALE_SECONDS:-120}
      DIAGNOSTIC_PROVIDER: ${DIAGNOSTIC_PROVIDER:-deterministic}
      DIAGNOSTIC_API_URL: ${DIAGNOSTIC_API_URL:-}
      DIAGNOSTIC_API_KEY: ${DIAGNOSTIC_API_KEY:-}
      DIAGNOSTIC_MODEL: ${DIAGNOSTIC_MODEL:-ops-diagnostic}
      DIAGNOSTIC_TIMEOUT_SECONDS: ${DIAGNOSTIC_TIMEOUT_SECONDS:-30}
      DIAGNOSTIC_LOG_LOOKBACK_SECONDS: ${DIAGNOSTIC_LOG_LOOKBACK_SECONDS:-900}
      DIAGNOSTIC_MAX_LOG_LINES: ${DIAGNOSTIC_MAX_LOG_LINES:-200}
      DIAGNOSTIC_MAX_LOG_BYTES: ${DIAGNOSTIC_MAX_LOG_BYTES:-65536}
      DIAGNOSTIC_COLLECTION_TIMEOUT_SECONDS: ${DIAGNOSTIC_COLLECTION_TIMEOUT_SECONDS:-10}
      DIAGNOSTIC_REQUEST_CLAIM_SECONDS: ${DIAGNOSTIC_REQUEST_CLAIM_SECONDS:-60}
      DIAGNOSTIC_RUN_STALE_SECONDS: ${DIAGNOSTIC_RUN_STALE_SECONDS:-300}
      CONVERSATION_PROVIDER: ${CONVERSATION_PROVIDER:-deterministic}
      CONVERSATION_API_URL: ${CONVERSATION_API_URL:-}
      CONVERSATION_API_KEY: ${CONVERSATION_API_KEY:-}
      CONVERSATION_MODEL: ${CONVERSATION_MODEL:-ops-conversation}
      CONVERSATION_TIMEOUT_SECONDS: ${CONVERSATION_TIMEOUT_SECONDS:-30}
      CONVERSATION_TURN_STALE_SECONDS: ${CONVERSATION_TURN_STALE_SECONDS:-300}
      CONVERSATION_MAX_CONTEXT_BYTES: ${CONVERSATION_MAX_CONTEXT_BYTES:-131072}
      CONVERSATION_REPOSITORY_KNOWLEDGE_ENABLED: ${CONVERSATION_REPOSITORY_KNOWLEDGE_ENABLED:-false}
      CONVERSATION_REPOSITORY_CHAT_ENABLED: ${CONVERSATION_REPOSITORY_CHAT_ENABLED:-false}
      CONVERSATION_REPOSITORY_MAX_CONTEXT_BYTES: ${CONVERSATION_REPOSITORY_MAX_CONTEXT_BYTES:-24576}
      CONVERSATION_REPOSITORY_MAX_RESULTS: ${CONVERSATION_REPOSITORY_MAX_RESULTS:-8}
      CONVERSATION_REPOSITORY_MAX_TERMS: ${CONVERSATION_REPOSITORY_MAX_TERMS:-8}
      CONVERSATION_REPOSITORY_MAX_EXCERPT_BYTES: ${CONVERSATION_REPOSITORY_MAX_EXCERPT_BYTES:-2048}
      CONVERSATION_REPOSITORY_STALE_SECONDS: ${CONVERSATION_REPOSITORY_STALE_SECONDS:-86400}
      CONVERSATION_OPERATION_HANDOFF_ENABLED: ${CONVERSATION_OPERATION_HANDOFF_ENABLED:-false}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_BASE64: ${GITHUB_APP_PRIVATE_KEY_BASE64:-}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_API_VERSION: ${GITHUB_API_VERSION:-2026-03-10}
      GITHUB_ALLOWED_FILE_PATHS: ${GITHUB_ALLOWED_FILE_PATHS:-README.md,docker-compose.yml,compose.yaml}
      GITHUB_MAX_FILE_BYTES: ${GITHUB_MAX_FILE_BYTES:-65536}
      GITHUB_WEBHOOK_MAX_BYTES: ${GITHUB_WEBHOOK_MAX_BYTES:-1048576}
      GITHUB_SYNC_CONCURRENCY: ${GITHUB_SYNC_CONCURRENCY:-4}
      GITHUB_WEBHOOK_RATE_LIMIT_PER_MINUTE: ${GITHUB_WEBHOOK_RATE_LIMIT_PER_MINUTE:-120}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 10
    mem_limit: 1g

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 2g

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 512m

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
